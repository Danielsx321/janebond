document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

    <\u002Fdiv>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <section style=\"max-width:1320px;margin:0 auto;padding:76px 44px 48px;display:grid;grid-template-columns:1.08fr 0.92fr;gap:64px;align-items:center;\">\n    <div>\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#34614A;margin:0 0 26px;\">Identity Strategist · Keynote Speaker · Executive Coach<\u002Fp>\n      <h1 style=\"font-family:'DM Serif Display',serif;font-weight:400;font-size:clamp(46px,5.2vw,76px);line-height:1.01;letter-spacing:-0.018em;margin:0 0 28px;text-wrap:balance;\">The Future of Leadership Begins with Identity.<\u002Fh1>\n      <p style=\"font-size:19px;line-height:1.68;color:#4B4A3D;max-width:31em;margin:0 0 36px;\">Strategy tells leaders what to do. Identity decides whether they can do it. Jane Bond helps executives and organizations rebuild the identity beneath the decisions — the overlooked driver of every result that follows.<\u002Fp>\n      <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n        <a href=\"#speaking\" style=\"padding:17px 28px;background:#34614A;color:#F4EFE5;font-size:15px;font-weight:600;letter-spacing:0.02em;text-decoration:none;border-radius:2px;display:inline-flex;align-items:center;gap:10px;\" style-hover=\"background:#274A38;\">Book Jane to Speak <span style=\"font-size:16px;\">→<\u002Fspan><\u002Fa>\n        <a href=\"#contact\" style=\"padding:17px 28px;background:transparent;color:#15150E;border:1px solid rgba(21,21,14,0.3);border-radius:2px;font-size:15px;font-weight:600;letter-spacing:0.02em;text-decoration:none;display:inline-flex;align-items:center;gap:10px;\" style-hover=\"border-color:#15150E;background:rgba(21,21,14,0.04);\">Schedule a Discovery Call<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;\">\n      <div style=\"position:relative;min-height:648px;border-radius:3px;background:repeating-linear-gradient(135deg,#E6DDCB 0 15px,#EDE6D6 15px 30px);border:1px solid rgba(21,21,14,0.1);overflow:hidden;display:flex;align-items:flex-end;\">\n        <div style=\"position:absolute;top:22px;left:22px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;color:#8A8676;background:rgba(244,239,229,0.7);padding:6px 10px;border-radius:2px;\">IMG — hero portrait, full-bleed<\u002Fdiv>\n        <div style=\"width:100%;padding:24px 26px;background:linear-gradient(to top,rgba(21,21,14,0.55),transparent);\">\n          <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.14em;color:#F4EFE5;margin:0;text-transform:uppercase;\">Jane Bond · Keynote, 2026<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"border-top:1px solid rgba(21,21,14,0.12);border-bottom:1px solid rgba(21,21,14,0.12);\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:26px 44px;display:flex;align-items:center;gap:44px;flex-wrap:wrap;\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#7C7A6C;flex:none;\">Trusted by leaders at<\u002Fspan>\n      <div style=\"display:flex;gap:46px;flex-wrap:wrap;align-items:center;\">\n        <span style=\"font-family:'DM Serif Display',serif;font-size:21px;color:#4B4A3D;\">TEDx<\u002Fspan>\n        <span style=\"font-family:'DM Serif Display',serif;font-size:21px;color:#4B4A3D;\">Fortune 500<\u002Fspan>\n        <span style=\"font-family:'DM Serif Display',serif;font-size:21px;color:#4B4A3D;\">Harvard Business Review<\u002Fspan>\n        <span style=\"font-family:'DM Serif Display',serif;font-size:21px;color:#4B4A3D;\">Forbes<\u002Fspan>\n        <span style=\"font-family:'DM Serif Display',serif;font-size:21px;color:#4B4A3D;\">The Aspen Institute<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <section style=\"background:#ECE4D4;border-bottom:1px solid rgba(21,21,14,0.1);\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:114px 44px;display:grid;grid-template-columns:0.92fr 1.08fr;gap:68px;align-items:center;\">\n      <div>\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#34614A;margin:0 0 22px;\">The Real Blocker<\u002Fp>\n        <h2 style=\"font-family:'DM Serif Display',serif;font-weight:400;font-size:clamp(38px,4vw,56px);line-height:1.04;letter-spacing:-0.015em;margin:0 0 24px;text-wrap:balance;\">Why People Stay Stuck<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.7;color:#4B4A3D;margin:0 0 18px;\">Most leaders don’t have a strategy problem. They have an identity problem. You can install a new plan, but if it runs on an old identity, it quietly produces old results.<\u002Fp>\n        <p style=\"font-size:18px;line-height:1.7;color:#4B4A3D;margin:0;\">Lasting change doesn’t start with a better decision. It starts one level deeper — with who you are being when the decision gets made.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FBF7EF;border:1px solid rgba(21,21,14,0.12);border-radius:3px;padding:44px 40px;\">\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9686;margin:0 0 16px;\">Before<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n          <span style=\"display:inline-flex;align-items:center;padding:14px 18px;border:1px solid rgba(21,21,14,0.16);border-radius:2px;font-weight:600;font-size:14px;color:#6B6A5C;background:#F4EFE5;\">Old Identity<\u002Fspan>\n          <span style=\"color:#B4AE9E;font-size:18px;\">→<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;padding:14px 18px;border:1px solid rgba(21,21,14,0.16);border-radius:2px;font-weight:600;font-size:14px;color:#6B6A5C;background:#F4EFE5;\">Old Decisions<\u002Fspan>\n          <span style=\"color:#B4AE9E;font-size:18px;\">→<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;padding:14px 18px;border:1px solid rgba(21,21,14,0.16);border-radius:2px;font-weight:600;font-size:14px;color:#6B6A5C;background:#F4EFE5;\">Old Results<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px;margin:26px 0;padding-left:2px;\">\n          <span style=\"width:9px;height:9px;background:#34614A;border-radius:50%;flex:none;\"><\u002Fspan>\n          <span style=\"font-size:14.5px;color:#34614A;font-weight:600;\">Rebuild the identity, and the entire chain changes.<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:#34614A;margin:0 0 16px;\">After<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n          <span style=\"display:inline-flex;align-items:center;padding:14px 18px;border:1px solid #34614A;border-radius:2px;font-weight:600;font-size:14px;color:#274A38;background:#E9F0EA;\">New Identity<\u002Fspan>\n          <span style=\"color:#34614A;font-size:18px;\">→<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;padding:14px 18px;border:1px solid #34614A;border-radius:2px;font-weight:600;font-size:14px;color:#274A38;background:#E9F0EA;\">New Decisions<\u002Fspan>\n          <span style=\"color:#34614A;font-size:18px;\">→<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;padding:14px 18px;border:1px solid #34614A;border-radius:2px;font-weight:600;font-size:14px;color:#274A38;background:#E9F0EA;\">New Results<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"about\" style=\"max-width:1320px;margin:0 auto;padding:120px 44px;display:grid;grid-template-columns:0.88fr 1.12fr;gap:76px;align-items:center;\">\n    <div style=\"position:relative;min-height:576px;border-radius:3px;background:repeating-linear-gradient(135deg,#E6DDCB 0 15px,#EDE6D6 15px 30px);border:1px solid rgba(21,21,14,0.1);\">\n      <div style=\"position:absolute;top:22px;left:22px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.1em;color:#8A8676;background:rgba(244,239,229,0.7);padding:6px 10px;border-radius:2px;\">IMG — portrait, Jane Bond<\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#34614A;margin:0 0 22px;\">About<\u002Fp>\n      <h2 style=\"font-family:'DM Serif Display',serif;font-weight:400;font-size:clamp(40px,4.4vw,60px);line-height:1.02;letter-spacing:-0.015em;margin:0 0 26px;\">Meet Jane Bond<\u002Fh2>\n      <p style=\"font-size:18px;line-height:1.72;color:#4B4A3D;margin:0 0 18px;\">Jane spent fifteen years advising leaders on strategy — and watched brilliant plans stall for reasons no plan could fix. The leaders weren’t missing tactics. They were operating from an identity built for a smaller room.<\u002Fp>\n      <p style=\"font-size:18px;line-height:1.72;color:#4B4A3D;margin:0 0 34px;\">So she built The Identity Method™: a repeatable way to rebuild who a leader is being, so the strategy finally has someone to run it. Today she advises executives and speaks to audiences worldwide on identity as the true engine of change.<\u002Fp>\n      <a href=\"#about\" style=\"padding:16px 26px;background:transparent;color:#15150E;border:1px solid rgba(21,21,14,0.3);border-radius:2px;font-size:15px;font-weight:600;letter-spacing:0.02em;text-decoration:none;display:inline-flex;align-items:center;gap:10px;\" style-hover=\"border-color:#15150E;background:rgba(21,21,14,0.04);\">My Story <span style=\"font-size:16px;\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"method\" style=\"background:#15150E;color:#EDE7D8;\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:120px 44px;\">\n      <div style=\"max-width:720px;margin:0 0 64px;\">\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8FB89E;margin:0 0 22px;\">The Framework<\u002Fp>\n        <h2 style=\"font-family:'DM Serif Display',serif;font-weight:400;font-size:clamp(40px,4.4vw,60px);line-height:1.03;letter-spacing:-0.015em;margin:0 0 20px;color:#F4EFE5;text-wrap:balance;\">The 5-Step Identity Method™<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.7;color:rgba(237,231,216,0.66);margin:0;\">A structured path from the identity that’s holding you back to the one your next chapter requires.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-top:1px solid rgba(237,231,216,0.16);\">\n        <div style=\"padding:34px 26px 34px 0;border-right:1px solid rgba(237,231,216,0.16);\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:40px;color:#8FB89E;line-height:1;margin-bottom:18px;\">01<\u002Fdiv>\n          <h3 style=\"font-size:18px;font-weight:600;margin:0 0 10px;color:#F4EFE5;\">Identity Audit<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.6;color:rgba(237,231,216,0.62);margin:0;\">Surface the identity quietly running today’s decisions.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:34px 26px;border-right:1px solid rgba(237,231,216,0.16);\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:40px;color:#8FB89E;line-height:1;margin-bottom:18px;\">02<\u002Fdiv>\n          <h3 style=\"font-size:18px;font-weight:600;margin:0 0 10px;color:#F4EFE5;\">Identity Deconstruction<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.6;color:rgba(237,231,216,0.62);margin:0;\">Separate who you are from who you were trained to be.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:34px 26px;border-right:1px solid rgba(237,231,216,0.16);\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:40px;color:#8FB89E;line-height:1;margin-bottom:18px;\">03<\u002Fdiv>\n          <h3 style=\"font-size:18px;font-weight:600;margin:0 0 10px;color:#F4EFE5;\">Identity Foreclosure<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.6;color:rgba(237,231,216,0.62);margin:0;\">Close the loops that keep the old self in charge.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:34px 26px;border-right:1px solid rgba(237,231,216,0.16);\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:40px;color:#8FB89E;line-height:1;margin-bottom:18px;\">04<\u002Fdiv>\n          <h3 style=\"font-size:18px;font-weight:600;margin:0 0 10px;color:#F4EFE5;\">Identity Equity<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.6;color:rgba(237,231,216,0.62);margin:0;\">Build the internal capital a bigger role requires.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:34px 0 34px 26px;\">\n          <div style=\"font-family:'DM Serif Display',serif;font-size:40px;color:#8FB89E;line-height:1;margin-bottom:18px;\">05<\u002Fdiv>\n          <h3 style=\"font-size:18px;font-weight:600;margin:0 0 10px;color:#F4EFE5;\">Identity Construction<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.6;color:rgba(237,231,216,0.62);margin:0;\">Install the identity your next chapter demands.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:52px;\">\n        <a href=\"#method\" style=\"padding:17px 28px;background:#34614A;color:#F4EFE5;font-size:15px;font-weight:600;letter-spacing:0.02em;text-decoration:none;border-radius:2px;display:inline-flex;align-items:center;gap:10px;\" style-hover=\"background:#3B6E54;\">Explore the Framework <span style=\"font-size:16px;\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"coaching\" style=\"max-width:1320px;margin:0 auto;padding:120px 44px;\">\n    <div style=\"max-width:680px;margin:0 0 58px;\">\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#34614A;margin:0 0 22px;\">Work With Jane<\u002Fp>\n      <h2 style=\"font-family:'DM Serif Display',serif;font-weight:400;font-size:clamp(40px,4.4vw,58px);line-height:1.03;letter-spacing:-0.015em;margin:0;text-wrap:balance;\">Three ways to begin the work<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:26px;\">\n      <div style=\"display:flex;flex-direction:column;background:#FBF7EF;border:1px solid rgba(21,21,14,0.12);border-radius:3px;padding:40px;\" style-hover=\"border-color:rgba(52,97,74,0.5);\">\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9686;margin:0 0 20px;\">Private · 1:1<\u002Fp>\n        <h3 style=\"font-family:'DM Serif Display',serif;font-weight:400;font-size:29px;line-height:1.1;margin:0 0 14px;\">Executive Coaching<\u002Fh3>\n        <p style=\"font-size:15.5px;line-height:1.65;color:#4B4A3D;margin:0 0 28px;flex-grow:1;\">High-touch, confidential work for leaders navigating a step-change in scope, visibility, or identity.<\u002Fp>\n        <a href=\"#coaching\" style=\"font-size:14.5px;font-weight:600;color:#34614A;text-decoration:none;display:inline-flex;align-items:center;gap:8px;\" style-hover=\"gap:12px;\">Explore Coaching <span>→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div id=\"speaking\" style=\"display:flex;flex-direction:column;background:#FBF7EF;border:1px solid rgba(21,21,14,0.12);border-radius:3px;padding:40px;\" style-hover=\"border-color:rgba(52,97,74,0.5);\">\n        <p style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9686;margin:0 0 20px;\">Stages · Teams<\u002Fp>\n        <h3 style=\"font-family:'DM Serif Display',serif;font-weight:400;font-size:29px;line-height:1.1;margin:0 0 14px;\">Keynote Speaking<\u002Fh3>\n        <p style=\"font-size:15.5px;li
